server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mercantiles-api
  
  datasource:
    url: jdbc:mysql://localhost:3306/mercantiles_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: tu_password_aqui
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Guayaquil

# JWT Configuration
jwt:
  secret: TuClaveSecretaMuyLargaYSeguraParaJWTDeAlMenos256BitsParaHS256
  expiration: 86400000 # 24 horas en milisegundos

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging
logging:
  level:
    com.mercantiles: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
